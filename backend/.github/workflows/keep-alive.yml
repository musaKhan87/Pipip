name: Keep Render Awake

on:
  schedule:
    # 7:00 AM IST to 11:50 AM IST (1:30–6:20 UTC)
    - cron: "*/10 2-5 * * *"

    # 12:00 PM IST to 10:50 PM IST (6:30–17:20 UTC)
    - cron: "*/10 7-16 * * *"

    # 11:00 PM IST (17:30 UTC)
    - cron: "30 17 * * *"

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render
        run: |
          curl -L https://pipip-backend.onrender.com/api/rentals